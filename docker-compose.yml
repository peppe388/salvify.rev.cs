services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: salvify
      POSTGRES_PASSWORD: salvify
      POSTGRES_DB: salvify
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      DATABASE_URL: postgresql://salvify:salvify@db:5432/salvify
      JWT_SECRET: change-this-in-production
    ports:
      - "3001:3001"
    depends_on:
      - db

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  pgdata:
